<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B0000"/>
      <stop offset="50%" style="stop-color:#6B0000"/>
      <stop offset="100%" style="stop-color:#4A0000"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE44D"/>
      <stop offset="30%" style="stop-color:#FFD700"/>
      <stop offset="70%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#E8960A"/>
    </linearGradient>
    <linearGradient id="coinEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC800"/>
      <stop offset="100%" style="stop-color:#CC8400"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFEC80"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="coinShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" rx="20" ry="20" fill="url(#bg)"/>

  <!-- Subtle decorative border -->
  <rect x="4" y="4" width="112" height="112" rx="17" ry="17" fill="none" stroke="#FFD700" stroke-width="0.8" opacity="0.3"/>

  <!-- Upward trend line behind coin -->
  <polyline points="18,88 35,78 48,82 62,65 78,58 95,38" fill="none" stroke="url(#arrow)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5" filter="url(#glow)"/>

  <!-- Arrow tip -->
  <polygon points="95,38 88,44 92,48" fill="#FFD700" opacity="0.5"/>

  <!-- Coin outer ring shadow -->
  <circle cx="60" cy="58" r="30" fill="none" filter="url(#coinShadow)"/>

  <!-- Coin outer body -->
  <circle cx="60" cy="58" r="30" fill="url(#coinGrad)" stroke="url(#coinEdge)" stroke-width="2.5"/>

  <!-- Coin inner ring detail -->
  <circle cx="60" cy="58" r="26" fill="none" stroke="#E8960A" stroke-width="0.8" opacity="0.6"/>

  <!-- Square hole in center -->
  <rect x="51" y="49" width="18" height="18" rx="2" ry="2" fill="url(#bg)" stroke="#CC8400" stroke-width="1.5"/>

  <!-- Coin decorative dots (prosperity symbols) -->
  <circle cx="60" cy="38" r="2" fill="#CC8400" opacity="0.7"/>
  <circle cx="60" cy="78" r="2" fill="#CC8400" opacity="0.7"/>
  <circle cx="40" cy="58" r="2" fill="#CC8400" opacity="0.7"/>
  <circle cx="80" cy="58" r="2" fill="#CC8400" opacity="0.7"/>

  <!-- Small sparkle top-right -->
  <g transform="translate(88,22)" opacity="0.8">
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#FFE44D" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#FFE44D" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-2.5" y1="-2.5" x2="2.5" y2="2.5" stroke="#FFE44D" stroke-width="1" stroke-linecap="round"/>
    <line x1="2.5" y1="-2.5" x2="-2.5" y2="2.5" stroke="#FFE44D" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Small sparkle bottom-left -->
  <g transform="translate(25,92)" opacity="0.5">
    <line x1="-3" y1="0" x2="3" y2="0" stroke="#FFE44D" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#FFE44D" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Text "Portfolio" at bottom -->
  <text x="60" y="104" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#FFD700" letter-spacing="1">PORTFOLIO</text>
</svg>